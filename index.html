<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThaiSpeak 2000</title>
<link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Press+Start+2P&family=Chonburi&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============ BACKGROUND SCENE: haunted gate ============ -->
  <div class="scene">
    <div class="fog fog-1"></div>
    <div class="fog fog-2"></div>
    <div class="fog fog-3"></div>
    <div class="stars"></div>
    <div class="noise-layer"></div>

    <div class="gate">
      <div class="pillar pillar-left"></div>
      <div class="pillar pillar-right"></div>
      <div class="fence fence-left"></div>
      <div class="fence fence-right"></div>
      <div class="arch"></div>

      <!-- Ghost face guarding the arch -->
      <svg class="ghost-face" viewBox="0 0 200 180" width="200" height="180">
        <defs>
          <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff6b6b"/>
            <stop offset="40%" stop-color="#ff3b3b"/>
            <stop offset="70%" stop-color="#8a0000"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <radialGradient id="faceGrad" cx="42%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#e8e0cf"/>
            <stop offset="45%" stop-color="#c7bfa9"/>
            <stop offset="80%" stop-color="#948c78"/>
            <stop offset="100%" stop-color="#655e4d"/>
          </radialGradient>
          <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a1816"/>
            <stop offset="100%" stop-color="#000000"/>
          </linearGradient>
        </defs>
        <!-- hair, layered strands for a more natural silhouette -->
        <path d="M42 38 Q18 95 26 172 Q34 145 38 120 Q40 150 48 168 Q52 130 50 95 Q56 70 55 88 Z" fill="url(#hairGrad)"/>
        <path d="M158 38 Q182 95 174 172 Q166 145 162 120 Q160 150 152 168 Q148 130 150 95 Q144 70 145 88 Z" fill="url(#hairGrad)"/>
        <!-- face with radial subsurface shading -->
        <ellipse cx="100" cy="80" rx="55" ry="65" fill="url(#faceGrad)"/>
        <!-- cheekbone/eye-socket hollows for depth -->
        <ellipse cx="78" cy="82" rx="16" ry="10" fill="#4a4335" opacity="0.25"/>
        <ellipse cx="122" cy="82" rx="16" ry="10" fill="#4a4335" opacity="0.25"/>
        <ellipse cx="100" cy="118" rx="20" ry="8" fill="#3a3428" opacity="0.15"/>
        <!-- cracks -->
        <path d="M70 40 Q75 60 65 75 Q80 85 72 100" stroke="#57503f" stroke-width="1.4" fill="none" opacity="0.8"/>
        <path d="M130 45 Q125 65 135 78 Q120 90 128 105" stroke="#57503f" stroke-width="1.4" fill="none" opacity="0.8"/>
        <path d="M100 30 Q98 55 102 78" stroke="#57503f" stroke-width="1.1" fill="none" opacity="0.7"/>
        <path d="M85 95 Q90 100 84 108" stroke="#57503f" stroke-width="1" fill="none" opacity="0.6"/>
        <!-- eye sockets (dark base beneath the glow) -->
        <ellipse cx="78" cy="76" rx="15" ry="12" fill="#1a1410"/>
        <ellipse cx="122" cy="76" rx="15" ry="12" fill="#1a1410"/>
        <!-- glowing eyes -->
        <circle cx="78" cy="75" r="13" fill="url(#eyeGlow)"/>
        <circle cx="122" cy="75" r="13" fill="url(#eyeGlow)"/>
        <circle cx="78" cy="75" r="4" fill="#fff0f0"/>
        <circle cx="122" cy="75" r="4" fill="#fff0f0"/>
        <!-- unsettling grin with gum shading -->
        <path d="M65 112 Q100 140 135 112 Q100 130 65 112 Z" fill="#1c0606"/>
        <path d="M68 114 Q100 128 132 114 Q100 122 68 114 Z" fill="#3a0d0d" opacity="0.6"/>
        <path d="M70 114 L74 122 M78 116 L81 125 M86 118 L88 127 M94 119 L95 128 M102 119 L103 128 M110 118 L112 127 M118 116 L121 125 M126 114 L130 122"
              stroke="#f2e9d8" stroke-width="1.6" stroke-linecap="round"/>
      </svg>

      <!-- Sign: ThaiSpeak (curved) + 2000 -->
      <svg class="sign" viewBox="0 0 520 170" width="100%" height="170">
        <defs>
          <path id="signArc" d="M 30 130 Q 260 20 490 130" fill="transparent"/>
        </defs>
        <text class="sign-title">
          <textPath href="#signArc" startOffset="50%" text-anchor="middle">ThaiSpeak</textPath>
        </text>
        <text x="260" y="165" text-anchor="middle" class="sign-year">2000</text>
      </svg>
    </div>
  </div>

  <!-- ============ FOREGROUND: the console ============ -->
  <div class="console">
    <div class="console-vents"></div>
    <div class="console-plate">MODEL&nbsp;TH-2000</div>
    <div class="led"></div>

    <div class="crt-frame">
      <div class="crt-screen">
        <div class="scanlines"></div>
        <div class="crt-glow"></div>
        <div class="screen-reflection"></div>
        <div class="noise-layer" style="opacity:0.04;"></div>

        <div class="screen-content">

          <div class="phrase-panel">
            <div class="panel-label">TARGET PHRASE</div>
            <div class="thai-display" id="thaiText">สวัสดีครับ</div>
            <div class="romanization" id="romanText">sawatdee khrap</div>
            <div class="meaning" id="meaningText">"Hello" (male speaker)</div>
          </div>

          <div class="result-panel">
            <div class="panel-label">RECOGNITION</div>
            <div class="status-line" id="statusText">Press RECORD and say the phrase above.</div>
            <div class="heard-line" id="heardText">&nbsp;</div>
          </div>

          <div class="score-panel">
            <div class="panel-label">ACCURACY</div>
            <div class="score-gauge">
              <div class="score-gauge-fill" id="scoreFill"></div>
              <div class="score-gauge-segments"></div>
            </div>
            <div class="score-number" id="scoreNumber">0%</div>
          </div>

          <div class="persona-area" id="personaArea">
            <img id="personaGif" src="" alt="" class="persona-gif">
            <div class="persona-caption-en" id="personaCaptionEn"></div>
            <div class="persona-caption-th" id="personaCaptionTh"></div>
          </div>

        </div>
      </div>
    </div>

    <!-- Physical button panel -->
    <div class="button-panel">
      <button class="arcade-btn btn-listen" id="listenBtn">
        <span class="btn-label-en">LISTEN</span>
        <span class="btn-label-th">ฟัง</span>
      </button>

      <button class="arcade-btn btn-recycle" id="newWordBtn" aria-label="New phrase" title="New phrase">
        <span class="recycle-icon">♻</span>
      </button>

      <button class="arcade-btn btn-record" id="recordBtn">
        <span class="btn-label-en" id="recordLabel">RECORD</span>
        <span class="btn-label-th">อัดเสียง</span>
      </button>
    </div>

    <div class="console-footer">
      <span id="footerStatus">Ready</span>
      <span>THAISPEAK 2000</span>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
