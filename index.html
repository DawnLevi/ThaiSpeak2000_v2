<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThaiSpeak 2000</title>
<link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Press+Start+2P&family=Chonburi&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============ BACKGROUND SCENE: haunted gate ============ -->
  <div class="scene">
    <div class="fog fog-1"></div>
    <div class="fog fog-2"></div>
    <div class="fog fog-3"></div>
    <div class="stars"></div>
    <div class="noise-layer"></div>

    <div class="gate">
      <div class="pillar pillar-left"></div>
      <div class="pillar pillar-right"></div>
      <div class="fence fence-left"></div>
      <div class="fence fence-right"></div>
      <div class="arch"></div>

      <!-- Hanging sign board above the gate -->
      <div class="sign-chain sign-chain-left"></div>
      <div class="sign-chain sign-chain-right"></div>
      <div class="sign-board">
        <svg class="sign-face" viewBox="0 0 200 170" width="128" height="109">
          <defs>
            <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ff8080"/>
              <stop offset="35%" stop-color="#ff3b3b"/>
              <stop offset="70%" stop-color="#8a0000"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <radialGradient id="faceGrad" cx="42%" cy="32%" r="75%">
              <stop offset="0%" stop-color="#efe7d6"/>
              <stop offset="40%" stop-color="#cfc6b0"/>
              <stop offset="75%" stop-color="#a49a82"/>
              <stop offset="100%" stop-color="#6e6552"/>
            </radialGradient>
            <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#201d19"/>
              <stop offset="100%" stop-color="#000000"/>
            </linearGradient>
          </defs>
          <path d="M42 36 Q16 94 24 168 Q33 142 37 118 Q39 150 47 166 Q52 128 49 92 Q56 66 55 86 Z" fill="url(#hairGrad)"/>
          <path d="M158 36 Q184 94 176 168 Q167 142 163 118 Q161 150 153 166 Q148 128 151 92 Q144 66 145 86 Z" fill="url(#hairGrad)"/>
          <ellipse cx="100" cy="78" rx="56" ry="66" fill="url(#faceGrad)"/>
          <ellipse cx="76" cy="80" rx="17" ry="11" fill="#4a4335" opacity="0.28"/>
          <ellipse cx="124" cy="80" rx="17" ry="11" fill="#4a4335" opacity="0.28"/>
          <ellipse cx="100" cy="118" rx="21" ry="9" fill="#3a3428" opacity="0.18"/>
          <ellipse cx="70" cy="100" rx="9" ry="6" fill="#8a5a4a" opacity="0.12"/>
          <ellipse cx="130" cy="100" rx="9" ry="6" fill="#8a5a4a" opacity="0.12"/>
          <path d="M68 38 Q74 60 63 76 Q80 87 71 102" stroke="#57503f" stroke-width="1.4" fill="none" opacity="0.85"/>
          <path d="M132 44 Q126 64 137 78 Q120 91 129 106" stroke="#57503f" stroke-width="1.4" fill="none" opacity="0.85"/>
          <path d="M100 28 Q97 54 102 78" stroke="#57503f" stroke-width="1.1" fill="none" opacity="0.75"/>
          <path d="M84 96 Q90 101 83 110" stroke="#57503f" stroke-width="1" fill="none" opacity="0.6"/>
          <path d="M116 98 Q112 104 118 112" stroke="#57503f" stroke-width="1" fill="none" opacity="0.6"/>
          <ellipse cx="76" cy="74" rx="16" ry="13" fill="#180f0c"/>
          <ellipse cx="124" cy="74" rx="16" ry="13" fill="#180f0c"/>
          <circle cx="76" cy="73" r="14" fill="url(#eyeGlow)"/>
          <circle cx="124" cy="73" r="14" fill="url(#eyeGlow)"/>
          <circle cx="76" cy="73" r="4.5" fill="#fff2f2"/>
          <circle cx="124" cy="73" r="4.5" fill="#fff2f2"/>
          <path d="M64 112 Q100 142 136 112 Q100 133 64 112 Z" fill="#170505"/>
          <path d="M67 114 Q100 130 133 114 Q100 123 67 114 Z" fill="#3a0d0d" opacity="0.65"/>
          <path d="M69 114 L73 123 M77 116 L80 126 M85 118 L87 128 M93 119 L94 129 M101 119 L102 129 M109 118 L111 128 M117 116 L120 126 M125 114 L129 123"
                stroke="#f2e9d8" stroke-width="1.7" stroke-linecap="round"/>
        </svg>

        <svg class="sign-title-svg" viewBox="0 0 340 130" width="100%" height="130">
          <defs>
            <path id="signArc" d="M 20 105 Q 170 8 320 105" fill="transparent"/>
            <linearGradient id="titleFill" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#f5f0e4"/>
              <stop offset="60%" stop-color="#dcd4c2"/>
              <stop offset="100%" stop-color="#b8ae98"/>
            </linearGradient>
          </defs>
          <text class="sign-title-text">
            <textPath href="#signArc" startOffset="50%" text-anchor="middle">ThaiSpeak</textPath>
          </text>
          <path class="blood-drip" d="M95 96 q-3 16 -6 24 q5 3 7 -4 q2 10 -4 16 q6 1 6 -7 z"/>
          <path class="blood-drip" d="M150 78 q-2 20 -5 30 q4 3 6 -4 q2 12 -3 18 q6 1 6 -8 z"/>
          <path class="blood-drip" d="M195 76 q3 18 6 27 q-4 3 -6 -4 q-2 11 4 17 q-6 1 -6 -7 z"/>
          <path class="blood-drip" d="M245 95 q2 15 5 22 q-4 3 -6 -3 q-1 9 4 14 q-5 2 -5 -6 z"/>
        </svg>

        <div class="sign-title-th">ไทยสปีค</div>

        <div class="sign-year-wrap">
          <div class="blood-drop drop-1"></div>
          <div class="blood-drop drop-2"></div>
          <div class="blood-drop drop-3"></div>
          <div class="sign-year">2000</div>
        </div>
        <div class="sign-year-th">๒๐๐๐</div>
      </div>
    </div>
  </div>

  <!-- ============ FOREGROUND: the console ============ -->
  <div class="console">
    <div class="console-vents"></div>
    <div class="console-plate">MODEL&nbsp;TH-2000 <span class="plate-th">รุ่น</span></div>
    <div class="led"></div>

    <div class="crt-frame">
      <div class="crt-screen">
        <div class="scanlines"></div>
        <div class="crt-glow"></div>
        <div class="screen-reflection"></div>
        <div class="noise-layer" style="opacity:0.04;"></div>

        <div class="screen-content">

          <div class="phrase-panel">
            <div class="panel-label">TARGET PHRASE <span class="panel-label-th">วลีเป้าหมาย</span></div>
            <div class="thai-display" id="thaiText">สวัสดีครับ</div>
            <div class="romanization" id="romanText">sawatdee khrap</div>
            <div class="meaning" id="meaningText">"Hello" (male speaker)</div>
          </div>

          <div class="result-panel">
            <div class="panel-label">RECOGNITION <span class="panel-label-th">ผลการฟัง</span></div>
            <div class="status-line" id="statusText">Press RECORD and say the phrase above.</div>
            <div class="status-line-th" id="statusTextTh">กดปุ่ม RECORD แล้วพูดวลีด้านบน</div>
            <div class="heard-line" id="heardText">&nbsp;</div>
          </div>

          <div class="score-panel">
            <div class="panel-label">ACCURACY <span class="panel-label-th">ความแม่นยำ</span></div>
            <div class="score-gauge">
              <div class="score-gauge-fill" id="scoreFill"></div>
              <div class="score-gauge-segments"></div>
            </div>
            <div class="score-number" id="scoreNumber">0%</div>
          </div>

          <div class="persona-area" id="personaArea">
            <img id="personaGif" src="" alt="" class="persona-gif">
            <div class="persona-caption-en" id="personaCaptionEn"></div>
            <div class="persona-caption-th" id="personaCaptionTh"></div>
          </div>

        </div>
      </div>
    </div>

    <!-- Physical button panel -->
    <div class="button-panel">
      <button class="arcade-btn btn-listen" id="listenBtn">
        <span class="btn-label-en">LISTEN</span>
        <span class="btn-label-th">ฟัง</span>
      </button>

      <button class="arcade-btn btn-recycle" id="newWordBtn" aria-label="New phrase" title="New phrase">
        <span class="recycle-icon">♻</span>
      </button>

      <button class="arcade-btn btn-record" id="recordBtn">
        <span class="btn-label-en" id="recordLabel">RECORD</span>
        <span class="btn-label-th">อัดเสียง</span>
      </button>
    </div>

    <div class="console-footer">
      <span id="footerStatus">Ready</span><span class="footer-th" id="footerStatusTh">พร้อม</span>
      <span>THAISPEAK 2000</span>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
